<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Control Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/mqttws31.min.js"></script>
    <style>
        /* ============================================================
           Base
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2d1e;
            min-height: 100vh;
            color: #333;
        }

        /* ============================================================
           Header
        ============================================================ */
        header {
            background: #2d5a27;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        header h1 { font-size: 20px; letter-spacing: 0.5px; }

        .conn-bar { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #888; flex-shrink: 0;
            animation: blink 2s infinite;
        }
        .dot.live    { background: #4caf50; }
        .dot.sim     { background: #ff9800; }
        .dot.offline { background: #f44336; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ============================================================
           Greenhouse tabs
        ============================================================ */
        .gh-tabs {
            display: flex;
            gap: 0;
            background: #162416;
            padding: 0 24px;
            overflow-x: auto;
        }
        .gh-tab {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #8ab88a;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s;
            user-select: none;
        }
        .gh-tab:hover  { color: #c8e6c9; }
        .gh-tab.active { color: #fff; border-bottom-color: #4caf50; }
        .gh-tab .badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 11px;
            background: #c62828;
            color: #fff;
            vertical-align: middle;
        }
        .gh-tab .badge.hidden { display: none; }

        /* ============================================================
           Main content area
        ============================================================ */
        .content { padding: 20px 24px; }

        /* ============================================================
           Greenhouse panel
        ============================================================ */
        .gh-panel { display: none; }
        .gh-panel.active { display: block; }

        .gh-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gh-title { font-size: 18px; font-weight: 700; color: #e8f5e9; }
        .gh-meta  { font-size: 13px; color: #8ab88a; }

        /* ============================================================
           Plant grid
        ============================================================ */
        .plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        /* ============================================================
           Plant card
        ============================================================ */
        .plant-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.18s, box-shadow 0.18s;
        }
        .plant-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 18px rgba(0,0,0,0.22);
        }

        .plant-card-hdr {
            background: #2d5a27;
            color: #fff;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .plant-card-hdr h3 { font-size: 15px; }
        .rpi-badge {
            font-size: 11px;
            background: rgba(255,255,255,0.18);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .plant-card-body { padding: 12px 14px; }

        /* ============================================================
           Sensor rows
        ============================================================ */
        .sensor-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: #f4f7f4;
        }
        .sensor-row.warn { background: #fff8e1; border-left: 3px solid #ff9800; }
        .sensor-row.crit { background: #fdecea; border-left: 3px solid #f44336; }

        .s-label { font-size: 13px; color: #555; }
        .s-value { font-size: 20px; font-weight: 700; color: #2d5a27; }
        .s-value.warn { color: #e65100; }
        .s-value.crit { color: #c62828; }
        .s-unit  { font-size: 11px; color: #999; margin-left: 3px; }

        /* pump buttons */
        .pump-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 8px;
            border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; color: #fff;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.82; }
        .btn-on  { background: #4caf50; }
        .btn-off { background: #e53935; }

        /* ============================================================
           Alerts panel
        ============================================================ */
        .alerts-panel {
            background: #fff;
            border-radius: 10px;
            padding: 14px 18px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            display: none;
            margin-bottom: 16px;
        }
        .alerts-panel h4 { font-size: 15px; margin-bottom: 10px; color: #333; }
        .alert-item {
            padding: 9px 12px;
            border-radius: 6px;
            margin-bottom: 7px;
            font-size: 13px;
        }
        .alert-item.warning  { background: #fff8e1; border-left: 3px solid #ff9800; }
        .alert-item.critical { background: #fdecea; border-left: 3px solid #f44336; }
        .alert-time { font-size: 11px; color: #aaa; margin-top: 3px; }

        /* ============================================================
           Status footer
        ============================================================ */
        .footer-bar {
            padding: 8px 24px;
            font-size: 12px;
            color: #8ab88a;
            background: #162416;
            border-top: 1px solid #2d5a27;
        }

        @media (max-width: 560px) {
            .plants-grid { grid-template-columns: 1fr; }
            .content { padding: 12px; }
        }
    </style>
</head>
<body>

<!-- ================================================================
     Header
================================================================ -->
<header>
    <h1>Greenhouse Control Dashboard</h1>
    <div class="conn-bar">
        <span class="dot" id="conn-dot"></span>
        <span id="conn-text">Connecting...</span>
        <span id="last-update" style="color:#8ab88a">|  Last update: --</span>
    </div>
</header>

<!-- ================================================================
     Greenhouse tabs
================================================================ -->
<div class="gh-tabs" id="gh-tabs"></div>

<!-- ================================================================
     Main content
================================================================ -->
<div class="content" id="content"></div>

<!-- ================================================================
     Footer
================================================================ -->
<div class="footer-bar" id="footer-bar">
    MQTT broker: localhost:9001 &nbsp;|&nbsp; Topics: greenhouse/{id}/plant/{plant_id}/{metric}
</div>

<!-- ================================================================
     Script
================================================================ -->
<script>
// ----------------------------------------------------------------
// Configuration - adjust before demo
// ----------------------------------------------------------------
const CONFIG = {
    mqttHost:        'localhost',
    mqttPort:        9001,
    mqttPath:        '/mqtt',
    numGreenhouses:  2,          // how many greenhouses to show
    numPlants:       3,          // plants per greenhouse
    simInterval:     5000,       // ms between simulation ticks
};

// Build greenhouse ID list: [1, 2, ..., N]
const GREENHOUSE_IDS = Array.from({ length: CONFIG.numGreenhouses }, (_, i) => i + 1);

// ----------------------------------------------------------------
// Alert thresholds
// ----------------------------------------------------------------
const THRESHOLDS = {
    temp: { max: 30,   unit: 'C',   severity: 'critical' },
    co2:  { max: 1500, unit: 'ppm', severity: 'critical' },
    soil: { min: 30,   unit: '%',   severity: 'warning'  },
};

// ----------------------------------------------------------------
// State
// ----------------------------------------------------------------
// state.data[gh_id][plant_id] = { temp, humidity, co2, soil, pump }
// state.alerts[gh_id] = [ {key, msg, severity, time}, ... ]
const state = {
    mode:             'offline',
    activeGreenhouse: GREENHOUSE_IDS[0],
    data:             {},
    alerts:           {},
};

GREENHOUSE_IDS.forEach(gh => {
    state.data[gh]   = {};
    state.alerts[gh] = [];
    for (let p = 1; p <= CONFIG.numPlants; p++) {
        state.data[gh][p] = { temp: null, humidity: null, co2: null, soil: null, pump: 'OFF' };
    }
});

// ----------------------------------------------------------------
// Build static DOM skeleton
// ----------------------------------------------------------------
function buildDOM() {
    const tabBar = document.getElementById('gh-tabs');
    const content = document.getElementById('content');

    GREENHOUSE_IDS.forEach(gh => {
        // Tab button
        const tab = document.createElement('div');
        tab.className = 'gh-tab' + (gh === state.activeGreenhouse ? ' active' : '');
        tab.id        = `tab-${gh}`;
        tab.onclick   = () => switchGreenhouse(gh);
        tab.innerHTML = `Greenhouse ${gh} <span class="badge hidden" id="badge-${gh}">0</span>`;
        tabBar.appendChild(tab);

        // Panel
        const panel = document.createElement('div');
        panel.className = 'gh-panel' + (gh === state.activeGreenhouse ? ' active' : '');
        panel.id        = `panel-${gh}`;
        panel.innerHTML = `
          <div class="gh-panel-header">
            <span class="gh-title">Greenhouse ${gh}</span>
            <span class="gh-meta" id="meta-${gh}">Waiting for data...</span>
          </div>
          <div class="alerts-panel" id="alerts-${gh}">
            <h4>Active Alerts</h4>
            <div id="alerts-list-${gh}"></div>
          </div>
          <div class="plants-grid" id="grid-${gh}"></div>`;
        content.appendChild(panel);

        // Plant cards
        const grid = panel.querySelector(`#grid-${gh}`);
        for (let p = 1; p <= CONFIG.numPlants; p++) {
            const card = document.createElement('div');
            card.className = 'plant-card';
            card.id        = `card-${gh}-${p}`;
            card.innerHTML = `
              <div class="plant-card-hdr">
                <h3>Plant ${p}</h3>
                <span class="rpi-badge">RPi node ${p}</span>
              </div>
              <div class="plant-card-body" id="body-${gh}-${p}"></div>`;
            grid.appendChild(card);
            renderPlantCard(gh, p);
        }
    });
}

// ----------------------------------------------------------------
// Greenhouse tab switching
// ----------------------------------------------------------------
function switchGreenhouse(gh) {
    state.activeGreenhouse = gh;
    document.querySelectorAll('.gh-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.gh-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${gh}`).classList.add('active');
    document.getElementById(`panel-${gh}`).classList.add('active');
}

// ----------------------------------------------------------------
// Plant card rendering
// ----------------------------------------------------------------
function sensorRow(label, value, unit, metric) {
    const rule   = THRESHOLDS[metric] || {};
    const display = value !== null ? (Math.round(value * 10) / 10) : '--';
    let rowCls = '', valCls = '';
    if (value !== null) {
        if (rule.max !== undefined && value > rule.max) { rowCls = 'crit'; valCls = 'crit'; }
        else if (rule.min !== undefined && value < rule.min) { rowCls = 'warn'; valCls = 'warn'; }
    }
    return `<div class="sensor-row ${rowCls}">
        <span class="s-label">${label}</span>
        <span class="s-value ${valCls}">${display}<span class="s-unit">${unit}</span></span>
    </div>`;
}

function renderPlantCard(gh, plantId) {
    const body = document.getElementById(`body-${gh}-${plantId}`);
    if (!body) return;
    const p = state.data[gh][plantId];
    body.innerHTML =
        sensorRow('Temperature',   p.temp,     '°C',  'temp') +
        sensorRow('Humidity',      p.humidity, '%',   '') +
        sensorRow('CO2',           p.co2,      'ppm', 'co2') +
        sensorRow('Soil Moisture', p.soil,     '%',   'soil') +
        `<div class="pump-row">
          <button class="btn btn-on"  onclick="setPump(${gh},${plantId},'ON')">Pump ON</button>
          <button class="btn btn-off" onclick="setPump(${gh},${plantId},'OFF')">Pump OFF</button>
        </div>`;
}

// ----------------------------------------------------------------
// Alert rendering
// ----------------------------------------------------------------
function addAlert(gh, plantId, metric, value) {
    const rule = THRESHOLDS[metric];
    if (!rule || value === null) return;

    let msg = null;
    if (rule.max !== undefined && value > rule.max)
        msg = `Plant ${plantId}: ${metric}=${Math.round(value)}${rule.unit} exceeds limit ${rule.max}${rule.unit}`;
    if (rule.min !== undefined && value < rule.min)
        msg = `Plant ${plantId}: ${metric}=${Math.round(value)}${rule.unit} below minimum ${rule.min}${rule.unit}`;
    if (!msg) return;

    const key     = `${gh}-${plantId}-${metric}`;
    const alerts  = state.alerts[gh];
    const idx     = alerts.findIndex(a => a.key === key);
    const entry   = { key, msg, severity: rule.severity, time: new Date().toLocaleTimeString() };

    if (idx >= 0) alerts[idx] = entry;
    else          alerts.unshift(entry);
    if (alerts.length > 10) alerts.pop();

    renderAlerts(gh);
}

function renderAlerts(gh) {
    const panel = document.getElementById(`alerts-${gh}`);
    const list  = document.getElementById(`alerts-list-${gh}`);
    const badge = document.getElementById(`badge-${gh}`);
    const alerts = state.alerts[gh];

    if (alerts.length === 0) {
        panel.style.display = 'none';
        badge.className = 'badge hidden';
        return;
    }
    panel.style.display = 'block';
    badge.className = 'badge';
    badge.textContent = alerts.length;
    list.innerHTML = alerts.slice(0, 6).map(a => `
        <div class="alert-item ${a.severity}">
          <div>${a.msg}</div>
          <div class="alert-time">${a.time}</div>
        </div>`).join('');
}

// ----------------------------------------------------------------
// MQTT message handler
// ----------------------------------------------------------------
function handleMessage(topic, payload) {
    // Expected: greenhouse/{gh_id}/plant/{plant_id}/{metric}
    const parts = topic.split('/');
    if (parts.length !== 5 || parts[0] !== 'greenhouse' || parts[2] !== 'plant') return;

    const gh      = parseInt(parts[1], 10);
    const plantId = parseInt(parts[3], 10);
    const metric  = parts[4];

    if (!state.data[gh])             state.data[gh] = {};
    if (!state.data[gh][plantId])    state.data[gh][plantId] = {};
    if (!state.alerts[gh])           state.alerts[gh] = [];

    const num = parseFloat(payload);
    state.data[gh][plantId][metric] = isNaN(num) ? payload : num;

    addAlert(gh, plantId, metric, isNaN(num) ? null : num);
    renderPlantCard(gh, plantId);
    updateMeta(gh);

    document.getElementById('last-update').textContent =
        '|  Last update: ' + new Date().toLocaleTimeString();
}

function updateMeta(gh) {
    const meta = document.getElementById(`meta-${gh}`);
    if (meta) meta.textContent = `${CONFIG.numPlants} plant nodes  |  updated ${new Date().toLocaleTimeString()}`;
}

// ----------------------------------------------------------------
// Actuator controls
// ----------------------------------------------------------------
function setPump(gh, plantId, cmd) {
    const topic = `greenhouse/${gh}/plant/${plantId}/pump`;
    if (state.mode === 'live' && mqttClient) {
        const msg = new Paho.MQTT.Message(cmd);
        msg.destinationName = topic;
        msg.qos = 1;
        mqttClient.send(msg);
    } else {
        state.data[gh][plantId].pump = cmd;
        renderPlantCard(gh, plantId);
    }
}

// ----------------------------------------------------------------
// MQTT connection
// ----------------------------------------------------------------
let mqttClient = null;
let simTimer   = null;

function connectMQTT() {
    const clientId = 'dash-' + Math.random().toString(16).substr(2, 8);
    try {
        mqttClient = new Paho.MQTT.Client(CONFIG.mqttHost, CONFIG.mqttPort, CONFIG.mqttPath, clientId);
    } catch (e) { startSim(); return; }

    mqttClient.onConnectionLost = () => {
        state.mode = 'offline';
        refreshHeader();
        setTimeout(connectMQTT, 5000);
    };
    mqttClient.onMessageArrived = msg => handleMessage(msg.destinationName, msg.payloadString);

    mqttClient.connect({
        timeout: 4,
        onSuccess: () => {
            state.mode = 'live';
            stopSim();
            refreshHeader();
            GREENHOUSE_IDS.forEach(gh => {
                mqttClient.subscribe(`greenhouse/${gh}/plant/+/temp`);
                mqttClient.subscribe(`greenhouse/${gh}/plant/+/humidity`);
                mqttClient.subscribe(`greenhouse/${gh}/plant/+/co2`);
                mqttClient.subscribe(`greenhouse/${gh}/plant/+/soil`);
                mqttClient.subscribe(`greenhouse/${gh}/plant/+/pump`);
            });
        },
        onFailure: () => { state.mode = 'offline'; refreshHeader(); startSim(); },
    });
}

// ----------------------------------------------------------------
// Simulation fallback
// ----------------------------------------------------------------
const _sim = {};
GREENHOUSE_IDS.forEach(gh => {
    _sim[gh] = {};
    for (let p = 1; p <= CONFIG.numPlants; p++) {
        _sim[gh][p] = {
            temp:     20 + Math.random() * 5,
            humidity: 55 + Math.random() * 15,
            co2:      700 + Math.random() * 200,
            soil:     40  + Math.random() * 30,
        };
    }
});

function simStep() {
    const rand  = (lo, hi) => lo + Math.random() * (hi - lo);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    GREENHOUSE_IDS.forEach(gh => {
        for (let p = 1; p <= CONFIG.numPlants; p++) {
            const s = _sim[gh][p];
            s.temp     = clamp(s.temp     + rand(-0.2, 0.25), 15, 40);
            s.humidity = clamp(s.humidity + rand(-0.5, 0.5),  30, 95);
            s.co2      = clamp(s.co2      + rand(-5,   15),  400, 2000);
            s.soil     = clamp(s.soil     + rand(-0.8, 0.2),   0, 100);

            Object.assign(state.data[gh][p], s);
            ['temp','co2','soil'].forEach(m => addAlert(gh, p, m, s[m]));
            renderPlantCard(gh, p);
            updateMeta(gh);
        }
    });
    document.getElementById('last-update').textContent =
        '|  Last update: ' + new Date().toLocaleTimeString();
}

function startSim() {
    if (simTimer) return;
    state.mode = 'sim';
    refreshHeader();
    simStep();
    simTimer = setInterval(simStep, CONFIG.simInterval);
}

function stopSim() {
    if (simTimer) { clearInterval(simTimer); simTimer = null; }
}

// ----------------------------------------------------------------
// Header status
// ----------------------------------------------------------------
function refreshHeader() {
    const dot  = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    dot.className = 'dot';
    if (state.mode === 'live') {
        dot.classList.add('live');
        text.textContent = 'Live - MQTT connected';
    } else if (state.mode === 'sim') {
        dot.classList.add('sim');
        text.textContent = 'Simulation mode (broker offline)';
    } else {
        dot.classList.add('offline');
        text.textContent = 'Offline - retrying...';
    }
}

// ----------------------------------------------------------------
// Boot
// ----------------------------------------------------------------
window.addEventListener('load', () => {
    buildDOM();
    refreshHeader();
    connectMQTT();
});
</script>
</body>
</html>
