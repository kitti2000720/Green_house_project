<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Control Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/paho-mqtt@1.1.0/paho-mqtt.min.js"></script>
    <style>
        /* ============================================================
           Base
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2d1e;
            min-height: 100vh;
            color: #333;
        }

        /* ============================================================
           Header
        ============================================================ */
        header {
            background: #2d5a27;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        header h1 { font-size: 20px; letter-spacing: 0.5px; }

        .conn-bar { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #888; flex-shrink: 0;
            animation: blink 2s infinite;
        }
        .dot.live    { background: #4caf50; }
        .dot.sim     { background: #ff9800; }
        .dot.offline { background: #f44336; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ============================================================
           Greenhouse tabs
        ============================================================ */
        .gh-tabs {
            display: flex;
            gap: 0;
            background: #162416;
            padding: 0 24px;
            overflow-x: auto;
        }
        .gh-tab {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #8ab88a;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s;
            user-select: none;
        }
        .gh-tab:hover  { color: #c8e6c9; }
        .gh-tab.active { color: #fff; border-bottom-color: #4caf50; }
        .gh-tab .badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 11px;
            background: #c62828;
            color: #fff;
            vertical-align: middle;
        }
        .gh-tab .badge.hidden { display: none; }

        /* ============================================================
           Main content area
        ============================================================ */
        .content { padding: 20px 24px; }

        /* ============================================================
           Greenhouse panel
        ============================================================ */
        .gh-panel { display: none; }
        .gh-panel.active { display: block; }

        .gh-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gh-title { font-size: 18px; font-weight: 700; color: #e8f5e9; }
        .gh-meta  { font-size: 13px; color: #8ab88a; }

        /* ============================================================
           Plant grid
        ============================================================ */
        .plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        /* ============================================================
           Plant card
        ============================================================ */
        .plant-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.18s, box-shadow 0.18s;
        }
        .plant-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 18px rgba(0,0,0,0.22);
        }

        .plant-card-hdr {
            background: #2d5a27;
            color: #fff;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .plant-card-hdr h3 { font-size: 15px; }
        .rpi-badge {
            font-size: 11px;
            background: rgba(255,255,255,0.18);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .plant-card-body { padding: 12px 14px; }

        /* ============================================================
           Sensor rows
        ============================================================ */
        .sensor-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: #f4f7f4;
        }
        .sensor-row.warn { background: #fff8e1; border-left: 3px solid #ff9800; }
        .sensor-row.crit { background: #fdecea; border-left: 3px solid #f44336; }

        .s-label { font-size: 13px; color: #555; }
        .s-value { font-size: 20px; font-weight: 700; color: #2d5a27; }
        .s-value.warn { color: #e65100; }
        .s-value.crit { color: #c62828; }
        .s-unit  { font-size: 11px; color: #999; margin-left: 3px; }

        /* pump buttons */
        .pump-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 8px;
            border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; color: #fff;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.82; }
        .btn-on  { background: #4caf50; }
        .btn-off { background: #e53935; }
        .btn-win-open  { background: #1976d2; }
        .btn-win-close { background: #546e7a; }

        /* Window state badge */
        .win-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }
        .win-badge.open   { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .win-badge.closed { background: #eceff1; color: #37474f; border: 1px solid #b0bec5; }

        /* CO2 status badge */
        .co2-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }
        .co2-badge.ok       { background: #e8f5e9; color: #2e7d32; }
        .co2-badge.high     { background: #fff8e1; color: #e65100; }
        .co2-badge.critical { background: #fdecea; color: #c62828; }

        /* Actuator row (window controls) */
        .actuator-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 6px;
            background: #f4f7f4;
            margin-bottom: 6px;
        }
        .actuator-row .s-label { font-size: 13px; color: #555; flex: 1; }

        /* ============================================================
           Alerts panel
        ============================================================ */
        .alerts-panel {
            background: #fff;
            border-radius: 10px;
            padding: 14px 18px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            display: none;
            margin-bottom: 16px;
        }
        .alerts-panel h4 { font-size: 15px; margin-bottom: 10px; color: #333; }
        .alert-item {
            padding: 9px 12px;
            border-radius: 6px;
            margin-bottom: 7px;
            font-size: 13px;
        }
        .alert-item.warning  { background: #fff8e1; border-left: 3px solid #ff9800; }
        .alert-item.critical { background: #fdecea; border-left: 3px solid #f44336; }
        .alert-time { font-size: 11px; color: #aaa; margin-top: 3px; }

        /* ============================================================
           Status footer
        ============================================================ */
        .footer-bar {
            padding: 8px 24px;
            font-size: 12px;
            color: #8ab88a;
            background: #162416;
            border-top: 1px solid #2d5a27;
        }

        @media (max-width: 560px) {
            .plants-grid { grid-template-columns: 1fr; }
            .content { padding: 12px; }
        }
    </style>
</head>
<body>

<!-- ================================================================
     Header
================================================================ -->
<header>
    <h1>Greenhouse Control Dashboard</h1>
    <div class="conn-bar">
        <span class="dot" id="conn-dot"></span>
        <span id="conn-text">Connecting...</span>
        <span id="last-update" style="color:#8ab88a">|  Last update: --</span>
    </div>
</header>

<!-- ================================================================
     Greenhouse tabs
================================================================ -->
<div class="gh-tabs" id="gh-tabs"></div>

<!-- ================================================================
     Main content
================================================================ -->
<div class="content" id="content"></div>

<!-- ================================================================
     Footer
================================================================ -->
<div class="footer-bar" id="footer-bar">
    MQTT broker: localhost:9001 &nbsp;|&nbsp; Topics: greenhouse/{id}/plant/{plant_id}/{metric}
</div>

<!-- ================================================================
     Script
================================================================ -->
<script>
// ----------------------------------------------------------------
// Configuration - adjust before demo
// ----------------------------------------------------------------
const CONFIG = {
    mqttHost:        'localhost',
    mqttPort:        9001,
    mqttPath:        '/mqtt',
    numGreenhouses:  2,          // how many greenhouses to show
    numPlants:       3,          // plants per greenhouse
    simInterval:     5000,       // ms between simulation ticks
};

// ----------------------------------------------------------------
// Alert thresholds
// ----------------------------------------------------------------
const THRESHOLDS = {
    temp: { max: 30,   unit: 'C',   severity: 'critical' },
    co2:  { max: 1500, unit: 'ppm', severity: 'critical' },
    soil: { min: 30,   unit: '%',   severity: 'warning'  },
};

// ----------------------------------------------------------------
// State — greenhouses and plants discovered dynamically from MQTT
// ----------------------------------------------------------------
const state = {
    mode:             'offline',
    activeGreenhouse: null,
    data:             {},   // data[gh][plant] = {temp,humidity,co2,soil,pump}
    alerts:           {},
    windows:          {},   // windows[gh] = 'OPEN' | 'CLOSED'
};

// ----------------------------------------------------------------
// Dynamic DOM helpers — create greenhouse tab/panel and plant card
// on first message, no hardcoded counts needed
// ----------------------------------------------------------------
function ensureGreenhouse(gh) {
    if (document.getElementById(`tab-${gh}`)) return;

    const tabBar = document.getElementById('gh-tabs');
    const content = document.getElementById('content');
    const isFirst = state.activeGreenhouse === null;
    if (isFirst) state.activeGreenhouse = gh;
    if (!state.data[gh])      state.data[gh]      = {};
    if (!state.alerts[gh])    state.alerts[gh]    = [];
    if (!state.windows[gh])   state.windows[gh]   = 'CLOSED';
    if (!state.enrichers)     state.enrichers     = {};
    if (!state.enrichers[gh]) state.enrichers[gh] = 'OFF';

    const tab = document.createElement('div');
    tab.className = 'gh-tab' + (isFirst ? ' active' : '');
    tab.id        = `tab-${gh}`;
    tab.onclick   = () => switchGreenhouse(gh);
    tab.innerHTML = `Greenhouse ${gh} <span class="badge hidden" id="badge-${gh}">0</span>`;
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'gh-panel' + (isFirst ? ' active' : '');
    panel.id        = `panel-${gh}`;
    panel.innerHTML = `
      <div class="gh-panel-header">
        <span class="gh-title">Greenhouse ${gh}</span>
        <div class="gh-window-ctrl" id="win-ctrl-${gh}">
          <span class="s-label" style="font-size:13px;color:#c8e6c9">Window:</span>
          <span class="win-badge closed" id="win-badge-${gh}">CLOSED</span>
          <button class="btn btn-win-open"  style="padding:4px 10px;font-size:12px" onclick="setWindow(${gh},'OPEN')">Open</button>
          <button class="btn btn-win-close" style="padding:4px 10px;font-size:12px" onclick="setWindow(${gh},'CLOSED')">Close</button>
          &nbsp;&nbsp;
          <span class="s-label" style="font-size:13px;color:#c8e6c9">CO2 Enricher:</span>
          <span class="win-badge closed" id="enrich-badge-${gh}">OFF</span>
        </div>
        <span class="gh-meta" id="meta-${gh}">Waiting for data...</span>
      </div>
      <div class="alerts-panel" id="alerts-${gh}">
        <h4>Active Alerts</h4>
        <div id="alerts-list-${gh}"></div>
      </div>
      <div class="plants-grid" id="grid-${gh}"></div>`;
    content.appendChild(panel);
}

function ensurePlantCard(gh, plantId) {
    ensureGreenhouse(gh);
    if (document.getElementById(`card-${gh}-${plantId}`)) return;

    if (!state.data[gh][plantId])
        state.data[gh][plantId] = { temp: null, humidity: null, co2: null, soil: null, pump: 'OFF', window: 'CLOSED' };

    const grid = document.getElementById(`grid-${gh}`);
    const card = document.createElement('div');
    card.className = 'plant-card';
    card.id        = `card-${gh}-${plantId}`;
    card.innerHTML = `
      <div class="plant-card-hdr">
        <h3>Plant ${plantId}</h3>
        <span class="rpi-badge">RPi node ${plantId}</span>
      </div>
      <div class="plant-card-body" id="body-${gh}-${plantId}"></div>`;
    grid.appendChild(card);
    renderPlantCard(gh, plantId);
}

// ----------------------------------------------------------------
// Build DOM skeleton — empty; greenhouses/plants added on first MQTT message
// ----------------------------------------------------------------
function buildDOM() {
    // In simulation mode, pre-build CONFIG.numGreenhouses × CONFIG.numPlants
    // so the UI is visible without needing a broker.
    // In live mode ensurePlantCard() creates tabs/cards on demand.
    for (let gh = 1; gh <= CONFIG.numGreenhouses; gh++) {
        for (let p = 1; p <= CONFIG.numPlants; p++) {
            ensurePlantCard(gh, p);
        }
    }
}

// ----------------------------------------------------------------
// Greenhouse tab switching
// ----------------------------------------------------------------
function switchGreenhouse(gh) {
    state.activeGreenhouse = gh;
    document.querySelectorAll('.gh-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.gh-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${gh}`).classList.add('active');
    document.getElementById(`panel-${gh}`).classList.add('active');
}

// ----------------------------------------------------------------
// Plant card rendering
// ----------------------------------------------------------------
function sensorRow(label, value, unit, metric) {
    const rule   = THRESHOLDS[metric] || {};
    const display = value !== null ? (Math.round(value * 10) / 10) : '--';
    let rowCls = '', valCls = '';
    if (value !== null) {
        if (rule.max !== undefined && value > rule.max) { rowCls = 'crit'; valCls = 'crit'; }
        else if (rule.min !== undefined && value < rule.min) { rowCls = 'warn'; valCls = 'warn'; }
    }
    return `<div class="sensor-row ${rowCls}">
        <span class="s-label">${label}</span>
        <span class="s-value ${valCls}">${display}<span class="s-unit">${unit}</span></span>
    </div>`;
}

function co2Badge(co2) {
    if (co2 === null) return '';
    if (co2 > 1500) return '<span class="co2-badge critical">ALARM</span>';
    if (co2 > 1200) return '<span class="co2-badge high">HIGH</span>';
    return '<span class="co2-badge ok">OK</span>';
}

function renderPlantCard(gh, plantId) {
    const body = document.getElementById(`body-${gh}-${plantId}`);
    if (!body) return;
    const p = state.data[gh][plantId];
    const winState  = (p.window || 'CLOSED').toUpperCase();
    const winCls    = winState === 'OPEN' ? 'open' : 'closed';
    const pumpState = (p.pump  || 'OFF').toUpperCase();
    body.innerHTML =
        sensorRow('Temperature',   p.temp,     '°C',  'temp') +
        sensorRow('Humidity',      p.humidity, '%',   '') +
        `<div class="sensor-row${p.co2 > 1500 ? ' crit' : p.co2 > 1200 ? ' warn' : ''}">
            <span class="s-label">CO2</span>
            <span class="s-value${p.co2 > 1500 ? ' crit' : p.co2 > 1200 ? ' warn' : ''}">
                ${p.co2 !== null ? Math.round(p.co2) : '--'}<span class="s-unit">ppm</span>
            </span>
            ${co2Badge(p.co2)}
        </div>` +
        sensorRow('Soil Moisture', p.soil,     '%',   'soil') +
        `<div class="actuator-row">
          <span class="s-label">Pump</span>
          <span class="win-badge ${pumpState==='ON' ? 'open' : 'closed'}" style="min-width:44px;text-align:center">${pumpState}</span>
          <button class="btn btn-on"  style="opacity:${pumpState==='ON'?'1':'0.45'}" onclick="setPump(${gh},${plantId},'ON')">ON</button>
          <button class="btn btn-off" style="opacity:${pumpState==='OFF'?'1':'0.45'}" onclick="setPump(${gh},${plantId},'OFF')">OFF</button>
        </div>`;
}

// ----------------------------------------------------------------
// Alert rendering
// ----------------------------------------------------------------
function addAlert(gh, plantId, metric, value) {
    const rule = THRESHOLDS[metric];
    if (!rule || value === null) return;

    const key    = `${gh}-${plantId}-${metric}`;
    const alerts = state.alerts[gh];

    let msg = null;
    if (rule.max !== undefined && value > rule.max)
        msg = `Plant ${plantId}: ${metric}=${Math.round(value)}${rule.unit} exceeds ${rule.max}${rule.unit}`;
    if (rule.min !== undefined && value < rule.min)
        msg = `Plant ${plantId}: ${metric}=${Math.round(value)}${rule.unit} below ${rule.min}${rule.unit}`;

    if (!msg) {
        const idx = alerts.findIndex(a => a.key === key);
        if (idx >= 0) { alerts.splice(idx, 1); renderAlerts(gh); }
        return;
    }

    const entry = { key, msg, severity: rule.severity, time: new Date().toLocaleTimeString() };
    const idx   = alerts.findIndex(a => a.key === key);
    if (idx >= 0) alerts[idx] = entry;
    else          alerts.unshift(entry);
    if (alerts.length > 10) alerts.pop();
    renderAlerts(gh);
}

function renderAlerts(gh) {
    const panel = document.getElementById(`alerts-${gh}`);
    const list  = document.getElementById(`alerts-list-${gh}`);
    const badge = document.getElementById(`badge-${gh}`);
    const alerts = state.alerts[gh];

    if (alerts.length === 0) {
        panel.style.display = 'none';
        badge.className = 'badge hidden';
        return;
    }
    panel.style.display = 'block';
    badge.className = 'badge';
    badge.textContent = alerts.length;
    list.innerHTML = alerts.slice(0, 6).map(a => `
        <div class="alert-item ${a.severity}">
          <div>${a.msg}</div>
          <div class="alert-time">${a.time}</div>
        </div>`).join('');
}

// ----------------------------------------------------------------
// MQTT message handler
// ----------------------------------------------------------------
function handleMessage(topic, payload) {
    const parts = topic.split('/');
    if (parts.length < 3 || parts[0] !== 'greenhouse') return;

    // greenhouse/{gh}/window  (3 parts) — shared greenhouse window
    if (parts.length === 3 && parts[2] === 'window') {
        const gh = parseInt(parts[1], 10);
        ensureGreenhouse(gh);
        state.windows[gh] = payload.toUpperCase();
        renderGreenhouseWindow(gh);
        return;
    }

    // greenhouse/{gh}/co2_enricher  (3 parts)
    if (parts.length === 3 && parts[2] === 'co2_enricher') {
        const gh = parseInt(parts[1], 10);
        ensureGreenhouse(gh);
        if (!state.enrichers) state.enrichers = {};
        state.enrichers[gh] = payload.toUpperCase();
        const badge = document.getElementById(`enrich-badge-${gh}`);
        if (badge) {
            badge.textContent = state.enrichers[gh];
            badge.className   = 'win-badge ' + (state.enrichers[gh] === 'ON' ? 'open' : 'closed');
        }
        return;
    }

    // greenhouse/{gh}/status/alarm  (4 parts)
    if (parts.length === 4 && parts[2] === 'status' && parts[3] === 'alarm') {
        const gh = parseInt(parts[1], 10);
        ensureGreenhouse(gh);
        if (!state.alerts[gh]) state.alerts[gh] = [];
        const key = `${gh}-co2-alarm`;
        if (payload.toUpperCase() === 'OK') {
            state.alerts[gh] = state.alerts[gh].filter(a => a.key !== key);
        } else {
            const entry = { key, msg: `CO2 ALARM: ${payload}`,
                            severity: 'critical', time: new Date().toLocaleTimeString() };
            const idx = state.alerts[gh].findIndex(a => a.key === key);
            if (idx >= 0) state.alerts[gh][idx] = entry; else state.alerts[gh].push(entry);
        }
        renderAlerts(gh);
        return;
    }

    // greenhouse/{gh_id}/plant/{plant_id}/{metric}  (5 parts)
    if (parts.length !== 5 || parts[2] !== 'plant') return;

    const gh      = parseInt(parts[1], 10);
    const plantId = parseInt(parts[3], 10);
    const metric  = parts[4];

    ensurePlantCard(gh, plantId);   // creates tab + card if new greenhouse/plant

    const num = parseFloat(payload);
    state.data[gh][plantId][metric] = isNaN(num) ? payload : num;

    addAlert(gh, plantId, metric, isNaN(num) ? null : num);
    renderPlantCard(gh, plantId);
    updateMeta(gh);

    document.getElementById('last-update').textContent =
        '|  Last update: ' + new Date().toLocaleTimeString();
}

function updateMeta(gh) {
    const meta = document.getElementById(`meta-${gh}`);
    if (!meta) return;
    const plantCount = state.data[gh] ? Object.keys(state.data[gh]).length : 0;
    meta.textContent = `${plantCount} plant nodes  |  updated ${new Date().toLocaleTimeString()}`;
}

// ----------------------------------------------------------------
// Actuator controls
// ----------------------------------------------------------------
function setPump(gh, plantId, cmd) {
    const topic = `greenhouse/${gh}/plant/${plantId}/pump`;
    if (state.mode === 'live' && mqttClient) {
        const msg = new Paho.Message(cmd);
        msg.destinationName = topic;
        msg.qos = 1;
        mqttClient.send(msg);
    } else {
        state.data[gh][plantId].pump = cmd;
        renderPlantCard(gh, plantId);
    }
}

function setWindow(gh, cmd) {
    const topic = `greenhouse/${gh}/window`;
    if (state.mode === 'live' && mqttClient) {
        const msg = new Paho.Message(cmd);
        msg.destinationName = topic;
        msg.qos = 1;
        mqttClient.send(msg);
    } else {
        state.windows[gh] = cmd;
        renderGreenhouseWindow(gh);
    }
}

function renderGreenhouseWindow(gh) {
    const badge = document.getElementById(`win-badge-${gh}`);
    if (!badge) return;
    const w = (state.windows[gh] || 'CLOSED').toUpperCase();
    badge.textContent = w;
    badge.className   = 'win-badge ' + (w === 'OPEN' ? 'open' : 'closed');
}

// ----------------------------------------------------------------
// MQTT connection
// ----------------------------------------------------------------
let mqttClient = null;
let simTimer   = null;

function connectMQTT() {
    const clientId = 'dash-' + Math.random().toString(16).substr(2, 8);
    try {
        mqttClient = new Paho.Client(CONFIG.mqttHost, CONFIG.mqttPort, CONFIG.mqttPath, clientId);
    } catch (e) { console.error('Paho init failed:', e); startSim(); return; }

    mqttClient.onConnectionLost = () => {
        state.mode = 'offline';
        refreshHeader();
        setTimeout(connectMQTT, 5000);
    };
    mqttClient.onMessageArrived = msg => handleMessage(msg.destinationName, msg.payloadString);

    mqttClient.connect({
        timeout: 4,
        onSuccess: () => {
            state.mode = 'live';
            stopSim();
            refreshHeader();
            // Wildcard subscriptions — discovers any number of greenhouses/plants
            mqttClient.subscribe('greenhouse/+/plant/+/temp');
            mqttClient.subscribe('greenhouse/+/plant/+/humidity');
            mqttClient.subscribe('greenhouse/+/plant/+/co2');
            mqttClient.subscribe('greenhouse/+/plant/+/soil');
            mqttClient.subscribe('greenhouse/+/plant/+/pump');
            mqttClient.subscribe('greenhouse/+/window');
            mqttClient.subscribe('greenhouse/+/co2_enricher');
            mqttClient.subscribe('greenhouse/+/status/alarm');
        },
        onFailure: () => { state.mode = 'offline'; refreshHeader(); startSim(); },
    });
}

// ----------------------------------------------------------------
// Simulation fallback — uses CONFIG.numGreenhouses × CONFIG.numPlants
// ----------------------------------------------------------------
const _sim = {};

function _initSim() {
    for (let gh = 1; gh <= CONFIG.numGreenhouses; gh++) {
        _sim[gh] = {};
        for (let p = 1; p <= CONFIG.numPlants; p++) {
            _sim[gh][p] = {
                temp:     20 + Math.random() * 5,
                humidity: 55 + Math.random() * 15,
                co2:      700 + Math.random() * 200,
                soil:     40  + Math.random() * 30,
            };
        }
    }
}

function simStep() {
    const rand  = (lo, hi) => lo + Math.random() * (hi - lo);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    for (let gh = 1; gh <= CONFIG.numGreenhouses; gh++) {
        for (let p = 1; p <= CONFIG.numPlants; p++) {
            ensurePlantCard(gh, p);
            const s = _sim[gh][p];
            s.temp     = clamp(s.temp     + rand(-0.2, 0.25), 15, 40);
            s.humidity = clamp(s.humidity + rand(-0.5, 0.5),  30, 95);
            s.co2      = clamp(s.co2      + rand(-5,   15),  400, 2000);
            s.soil     = clamp(s.soil     + rand(-0.8, 0.2),   0, 100);

            Object.assign(state.data[gh][p], s);
            ['temp','co2','soil'].forEach(m => addAlert(gh, p, m, s[m]));
            renderPlantCard(gh, p);
            updateMeta(gh);
        }
    }
    document.getElementById('last-update').textContent =
        '|  Last update: ' + new Date().toLocaleTimeString();
}

function startSim() {
    if (simTimer) return;
    _initSim();
    state.mode = 'sim';
    refreshHeader();
    simStep();
    simTimer = setInterval(simStep, CONFIG.simInterval);
}

function stopSim() {
    if (simTimer) { clearInterval(simTimer); simTimer = null; }
}

// ----------------------------------------------------------------
// Header status
// ----------------------------------------------------------------
function refreshHeader() {
    const dot  = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    dot.className = 'dot';
    if (state.mode === 'live') {
        dot.classList.add('live');
        text.textContent = 'Live - MQTT connected';
    } else if (state.mode === 'sim') {
        dot.classList.add('sim');
        text.textContent = 'Simulation mode (broker offline)';
    } else {
        dot.classList.add('offline');
        text.textContent = 'Offline - retrying...';
    }
}

// ----------------------------------------------------------------
// Boot
// ----------------------------------------------------------------
window.addEventListener('load', () => {
    buildDOM();
    refreshHeader();
    connectMQTT();
});
</script>
