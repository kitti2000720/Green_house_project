<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Control Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #666;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #51cf66;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .metric-name {
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .metric-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .metric-unit {
            color: #999;
            font-size: 12px;
            margin-left: 4px;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .critical {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .warning .metric-value {
            color: #ff6b6b;
        }

        .critical .metric-value {
            color: #dc3545;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .btn-on {
            background: #51cf66;
        }

        .btn-on:hover {
            background: #40c057;
        }

        .btn-off {
            background: #ff8787;
        }

        .btn-off:hover {
            background: #ff6b6b;
        }

        .btn-open {
            background: #667eea;
        }

        .btn-open:hover {
            background: #5568d3;
        }

        .plant {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .plant-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .plant-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .alerts {
            grid-column: 1 / -1;
            margin-top: 20px;
        }

        .alert-item {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-item.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }

        .alert-item.info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
        }

        .alert-message {
            font-size: 14px;
            color: #333;
        }

        .alert-time {
            font-size: 12px;
            color: #999;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        .last-update {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-align: right;
        }

        .grid-full {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .card h2 {
                font-size: 16px;
            }

            .metric-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Greenhouse Control Dashboard</h1>
            <div class="status-bar">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="connectionText">Connecting...</span>
                </div>
                <div id="lastUpdate">Last update: --:--:--</div>
            </div>
        </header>

        <div class="dashboard">
            <!-- Environment Card -->
            <div class="card">
                <h2>Environment</h2>
                <div class="metric" id="tempMetric">
                    <span class="metric-name">Temperature</span>
                    <span class="metric-value">-- <span class="metric-unit">°C</span></span>
                </div>
                <div class="metric" id="humidityMetric">
                    <span class="metric-name">Humidity</span>
                    <span class="metric-value">-- <span class="metric-unit">%</span></span>
                </div>
                <div class="metric" id="co2Metric">
                    <span class="metric-name">CO₂ Level</span>
                    <span class="metric-value">-- <span class="metric-unit">ppm</span></span>
                </div>

                <div class="controls">
                    <button class="btn btn-open" onclick="toggleWindow()">Ventilation</button>
                </div>
                <div class="last-update" id="envUpdate"></div>
            </div>

            <!-- Plants Card -->
            <div class="card grid-full">
                <h2>Plants</h2>
                <div class="plant" id="plantsContainer">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Alerts Card -->
            <div class="card grid-full" id="alertsCard" style="display: none;">
                <h2>🚨 Active Alerts</h2>
                <div id="alertsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            mqttBroker: 'ws://localhost:9001', // WebSocket endpoint
            pollInterval: 5000, // ms
            greenhouseId: 1
        };

        // Data storage
        let systemState = {
            connected: false,
            env: {},
            plants: {},
            alerts: []
        };

        // Mock MQTT client (since WebSocket MQTT might not be available)
        // In production, use: https://github.com/emqx/MQTT-Client-Examples
        class MockMQTTClient {
            constructor() {
                this.connected = false;
                this.subscriptions = {};
                this.simulateConnection();
            }

            connect() {
                setTimeout(() => {
                    this.connected = true;
                    this.updateUI();
                }, 1000);
            }

            publish(topic, message) {
                console.log(`Published to ${topic}:`, message);
                // In real implementation, publish via WebSocket
            }

            subscribe(topic) {
                this.subscriptions[topic] = true;
                console.log(`Subscribed to ${topic}`);
            }

            simulateConnection() {
                this.connect();
                // Simulate sensor updates
                this.startSimulation();
            }

            startSimulation() {
                setInterval(() => {
                    // Simulate environment data
                    systemState.env = {
                        temp: 22 + Math.random() * 5,
                        humidity: 60 + Math.random() * 15,
                        co2: 800 + Math.random() * 400
                    };

                    // Simulate plant data
                    systemState.plants = {};
                    for (let i = 1; i <= 3; i++) {
                        systemState.plants[i] = {
                            moisture: 40 + Math.random() * 40,
                            pump: Math.random() > 0.8 ? 'ON' : 'OFF'
                        };
                    }

                    this.updateUI();
                }, CONFIG.pollInterval);
            }

            updateUI() {
                updateDashboard();
            }
        }

        const mqtt = new MockMQTTClient();

        // Update dashboard with current state
        function updateDashboard() {
            // Update connection status
            const statusDot = document.getElementById('statusDot');
            const connectionText = document.getElementById('connectionText');
            
            if (mqtt.connected) {
                statusDot.classList.add('connected');
                connectionText.textContent = 'Connected to MQTT Broker';
            } else {
                statusDot.classList.remove('connected');
                connectionText.textContent = 'Disconnected from MQTT Broker';
            }

            // Update timestamp
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `Last update: ${now.toLocaleTimeString()}`;

            // Update environment metrics
            if (systemState.env.temp !== undefined) {
                const tempMetric = document.getElementById('tempMetric');
                const temp = systemState.env.temp.toFixed(1);
                tempMetric.querySelector('.metric-value').innerHTML = 
                    `${temp} <span class="metric-unit">°C</span>`;
                
                // Warn if too hot
                if (temp > 30) {
                    tempMetric.classList.add('critical');
                } else {
                    tempMetric.classList.remove('critical');
                }

                document.getElementById('envUpdate').textContent = 
                    `Updated: ${now.toLocaleTimeString()}`;
            }

            if (systemState.env.humidity !== undefined) {
                const humidityMetric = document.getElementById('humidityMetric');
                const humidity = systemState.env.humidity.toFixed(1);
                humidityMetric.querySelector('.metric-value').innerHTML = 
                    `${humidity} <span class="metric-unit">%</span>`;
            }

            if (systemState.env.co2 !== undefined) {
                const co2Metric = document.getElementById('co2Metric');
                const co2 = systemState.env.co2.toFixed(0);
                co2Metric.querySelector('.metric-value').innerHTML = 
                    `${co2} <span class="metric-unit">ppm</span>`;
                
                // Alert if CO2 too high
                if (co2 > 1500) {
                    co2Metric.classList.add('critical');
                    addAlert('CO₂ Level Critical', `CO₂ level is ${co2} ppm`, 'critical');
                } else {
                    co2Metric.classList.remove('critical');
                }
            }

            // Update plants
            updatePlantsDisplay();

            // Update alerts
            updateAlertsDisplay();
        }

        function updatePlantsDisplay() {
            const container = document.getElementById('plantsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= 3; i++) {
                const plant = systemState.plants[i] || {};
                const moisture = (plant.moisture || 0).toFixed(1);
                
                const card = document.createElement('div');
                card.className = 'plant-card';
                if (moisture < 30) {
                    card.classList.add('warning');
                }

                card.innerHTML = `
                    <div class="plant-title">Plant ${i}</div>
                    <div class="metric" style="background: white; margin-bottom: 10px;">
                        <span class="metric-name">Moisture</span>
                        <span class="metric-value">${moisture}<span class="metric-unit">%</span></span>
                    </div>
                    <div class="metric" style="background: white;">
                        <span class="metric-name">Pump</span>
                        <span class="metric-value" style="color: ${plant.pump === 'ON' ? '#51cf66' : '#999'}">${plant.pump || 'OFF'}</span>
                    </div>
                    <div class="controls">
                        <button class="btn btn-on" onclick="togglePump(${i}, 'on')">Turn ON</button>
                        <button class="btn btn-off" onclick="togglePump(${i}, 'off')">Turn OFF</button>
                    </div>
                `;

                container.appendChild(card);
            }
        }

        function updateAlertsDisplay() {
            const alertsList = document.getElementById('alertsList');
            const alertsCard = document.getElementById('alertsCard');

            if (systemState.alerts.length === 0) {
                alertsCard.style.display = 'none';
                return;
            }

            alertsCard.style.display = 'block';
            alertsList.innerHTML = '';

            systemState.alerts.slice(-5).forEach(alert => {
                const item = document.createElement('div');
                item.className = `alert-item ${alert.type}`;
                item.innerHTML = `
                    <div>
                        <div class="alert-message">${alert.message}</div>
                        <div class="alert-time">${alert.time}</div>
                    </div>
                `;
                alertsList.appendChild(item);
            });
        }

        function addAlert(title, message, type = 'info') {
            const now = new Date().toLocaleTimeString();
            systemState.alerts.push({
                title,
                message,
                type,
                time: now
            });
            // Keep only last 10 alerts
            if (systemState.alerts.length > 10) {
                systemState.alerts.shift();
            }
        }

        function togglePump(plantId, state) {
            const topic = `greenhouse/${CONFIG.greenhouseId}/plant/${plantId}/pump`;
            const message = state.toUpperCase();
            mqtt.publish(topic, message);
            addAlert(`Plant ${plantId} Pump`, `Pump turned ${message}`, 'info');
        }

        function toggleWindow() {
            const topic = `greenhouse/${CONFIG.greenhouseId}/actuators/window`;
            const message = 'OPEN'; // Toggle logic would be more complex
            mqtt.publish(topic, message);
            addAlert('Ventilation', 'Opening ventilation window', 'info');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            console.log('Dashboard initialized');
            updateDashboard();
        });
    </script>
</body>
</html>
