<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Control Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #666;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #51cf66;
            animation: pulse-green 2s infinite;
        }

        .status-dot.simulating {
            background: #ffa94d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .metric-name {
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .metric-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .metric-unit {
            color: #999;
            font-size: 12px;
            margin-left: 4px;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .critical {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .warning .metric-value {
            color: #ff6b6b;
        }

        .critical .metric-value {
            color: #dc3545;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .btn-on {
            background: #51cf66;
        }

        .btn-on:hover {
            background: #40c057;
        }

        .btn-off {
            background: #ff8787;
        }

        .btn-off:hover {
            background: #ff6b6b;
        }

        .btn-open {
            background: #667eea;
        }

        .btn-open:hover {
            background: #5568d3;
        }

        .plant {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .plant-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .plant-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .alerts {
            grid-column: 1 / -1;
            margin-top: 20px;
        }

        .alert-item {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-item.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }

        .alert-item.info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
        }

        .alert-message {
            font-size: 14px;
            color: #333;
        }

        .alert-time {
            font-size: 12px;
            color: #999;
        }

        .last-update {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-align: right;
        }

        .grid-full {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .card h2 {
                font-size: 16px;
            }

            .metric-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Greenhouse Control Dashboard</h1>
            <div class="status-bar">
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="connectionText">Connecting...</span>
                </div>
                <div id="lastUpdate">Last update: --:--:--</div>
            </div>
        </header>

        <div class="dashboard">
            <!-- Environment Card -->
            <div class="card">
                <h2>Environment</h2>
                <div class="metric" id="tempMetric">
                    <span class="metric-name">Temperature</span>
                    <span class="metric-value">-- <span class="metric-unit">°C</span></span>
                </div>
                <div class="metric" id="humidityMetric">
                    <span class="metric-name">Humidity</span>
                    <span class="metric-value">-- <span class="metric-unit">%</span></span>
                </div>
                <div class="metric" id="co2Metric">
                    <span class="metric-name">CO2 Level</span>
                    <span class="metric-value">-- <span class="metric-unit">ppm</span></span>
                </div>

                <div class="controls">
                    <button class="btn btn-open" onclick="toggleWindow()">Ventilation</button>
                </div>
                <div class="last-update" id="envUpdate"></div>
            </div>

            <!-- Plants Card -->
            <div class="card grid-full">
                <h2>Plants</h2>
                <div class="plant" id="plantsContainer">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Alerts Card -->
            <div class="card grid-full" id="alertsCard" style="display: none;">
                <h2>Active Alerts</h2>
                <div id="alertsList"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            mqttHost: 'localhost',
            mqttPort: 9001,
            mqttPath: '/mqtt',
            pollInterval: 5000,
            greenhouseId: 1,
            numPlants: 3
        };

        let systemState = {
            connected: false,
            simulating: false,
            env: {},
            plants: {},
            alerts: []
        };

        let mqttClient = null;
        let simulationTimer = null;

        // Initialize plant state
        for (let i = 1; i <= CONFIG.numPlants; i++) {
            systemState.plants[i] = { moisture: null, pump: 'OFF' };
        }

        // --- Real MQTT via Paho WebSocket ---

        function connectMQTT() {
            const clientId = 'dashboard-' + Math.random().toString(16).substr(2, 8);
            try {
                mqttClient = new Paho.MQTT.Client(CONFIG.mqttHost, CONFIG.mqttPort, CONFIG.mqttPath, clientId);
            } catch (e) {
                console.warn('Paho MQTT not available, falling back to simulation.');
                startSimulation();
                return;
            }

            mqttClient.onConnectionLost = (resp) => {
                console.warn('MQTT connection lost:', resp.errorMessage);
                systemState.connected = false;
                systemState.simulating = false;
                updateConnectionStatus();
                setTimeout(connectMQTT, 5000);
            };

            mqttClient.onMessageArrived = (message) => {
                handleMQTTMessage(message.destinationName, message.payloadString);
            };

            mqttClient.connect({
                timeout: 4,
                onSuccess: () => {
                    systemState.connected = true;
                    systemState.simulating = false;
                    updateConnectionStatus();
                    stopSimulation();

                    const gh = CONFIG.greenhouseId;
                    mqttClient.subscribe(`greenhouse/${gh}/env/+`);
                    mqttClient.subscribe(`greenhouse/${gh}/plant/+/soil`);
                    mqttClient.subscribe(`greenhouse/${gh}/plant/+/pump`);
                    mqttClient.subscribe(`greenhouse/${gh}/actuators/+`);
                    mqttClient.subscribe(`greenhouse/${gh}/status/+`);
                },
                onFailure: () => {
                    console.info('MQTT broker not reachable, using simulation mode.');
                    systemState.connected = false;
                    updateConnectionStatus();
                    startSimulation();
                }
            });
        }

        function publishMQTT(topic, payload) {
            if (!mqttClient || !systemState.connected) return;
            const msg = new Paho.MQTT.Message(payload);
            msg.destinationName = topic;
            msg.qos = 1;
            mqttClient.send(msg);
        }

        function handleMQTTMessage(topic, payload) {
            const gh = CONFIG.greenhouseId;
            const now = new Date();

            if (topic === `greenhouse/${gh}/env/temp`) {
                systemState.env.temp = parseFloat(payload);
            } else if (topic === `greenhouse/${gh}/env/humidity`) {
                systemState.env.humidity = parseFloat(payload);
            } else if (topic === `greenhouse/${gh}/env/co2`) {
                systemState.env.co2 = parseFloat(payload);
            } else {
                // Plant topics: greenhouse/1/plant/2/soil
                const soilMatch = topic.match(/plant\/(\d+)\/soil$/);
                const pumpMatch = topic.match(/plant\/(\d+)\/pump$/);
                if (soilMatch) {
                    const id = parseInt(soilMatch[1]);
                    if (!systemState.plants[id]) systemState.plants[id] = {};
                    systemState.plants[id].moisture = parseFloat(payload);
                } else if (pumpMatch) {
                    const id = parseInt(pumpMatch[1]);
                    if (!systemState.plants[id]) systemState.plants[id] = {};
                    systemState.plants[id].pump = payload;
                }
            }

            updateDashboard();
        }

        // --- Simulation fallback ---

        function startSimulation() {
            if (simulationTimer) return;
            systemState.simulating = true;
            updateConnectionStatus();

            // Seed initial values
            systemState.env = { temp: 22, humidity: 65, co2: 800 };
            for (let i = 1; i <= CONFIG.numPlants; i++) {
                systemState.plants[i] = { moisture: 40 + Math.random() * 30, pump: 'OFF' };
            }

            simulationTimer = setInterval(() => {
                // Simulate environment drift
                systemState.env.temp = Math.max(15, Math.min(40,
                    systemState.env.temp + (Math.random() - 0.4) * 0.3));
                systemState.env.humidity = Math.max(30, Math.min(95,
                    systemState.env.humidity + (Math.random() - 0.5) * 0.8));
                systemState.env.co2 = Math.max(400, Math.min(2000,
                    systemState.env.co2 + (Math.random() - 0.3) * 15));

                for (let i = 1; i <= CONFIG.numPlants; i++) {
                    const delta = systemState.plants[i].pump === 'ON'
                        ? Math.random() * 2
                        : -(Math.random() * 0.8);
                    systemState.plants[i].moisture = Math.max(0, Math.min(100,
                        systemState.plants[i].moisture + delta));
                }

                updateDashboard();
            }, CONFIG.pollInterval);
        }

        function stopSimulation() {
            if (simulationTimer) {
                clearInterval(simulationTimer);
                simulationTimer = null;
            }
            systemState.simulating = false;
        }

        // --- UI update ---

        function updateConnectionStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('connectionText');
            dot.className = 'status-dot';
            if (systemState.connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected to MQTT Broker (live data)';
            } else if (systemState.simulating) {
                dot.classList.add('simulating');
                text.textContent = 'Simulation mode (broker not available)';
            } else {
                text.textContent = 'Connecting...';
            }
        }

        function updateDashboard() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `Last update: ${now.toLocaleTimeString()}`;

            // Temperature
            if (systemState.env.temp !== undefined && systemState.env.temp !== null) {
                const tempMetric = document.getElementById('tempMetric');
                const temp = parseFloat(systemState.env.temp).toFixed(1);
                tempMetric.querySelector('.metric-value').innerHTML =
                    `${temp} <span class="metric-unit">°C</span>`;
                tempMetric.classList.toggle('critical', temp > 30);
                document.getElementById('envUpdate').textContent =
                    `Updated: ${now.toLocaleTimeString()}`;
            }

            // Humidity
            if (systemState.env.humidity !== undefined && systemState.env.humidity !== null) {
                const humidityMetric = document.getElementById('humidityMetric');
                const humidity = parseFloat(systemState.env.humidity).toFixed(1);
                humidityMetric.querySelector('.metric-value').innerHTML =
                    `${humidity} <span class="metric-unit">%</span>`;
            }

            // CO2
            if (systemState.env.co2 !== undefined && systemState.env.co2 !== null) {
                const co2Metric = document.getElementById('co2Metric');
                const co2 = parseFloat(systemState.env.co2).toFixed(0);
                co2Metric.querySelector('.metric-value').innerHTML =
                    `${co2} <span class="metric-unit">ppm</span>`;
                if (co2 > 1500) {
                    co2Metric.classList.add('critical');
                    addAlert('CO2 Level Critical', `CO2 level is ${co2} ppm`, 'critical');
                } else {
                    co2Metric.classList.remove('critical');
                }
            }

            updatePlantsDisplay();
            updateAlertsDisplay();
        }

        function updatePlantsDisplay() {
            const container = document.getElementById('plantsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= CONFIG.numPlants; i++) {
                const plant = systemState.plants[i] || {};
                const moisture = plant.moisture != null ? parseFloat(plant.moisture).toFixed(1) : '--';
                const pump = plant.pump || 'OFF';
                const isLow = plant.moisture != null && parseFloat(plant.moisture) < 30;

                const card = document.createElement('div');
                card.className = 'plant-card' + (isLow ? ' warning' : '');
                card.innerHTML = `
                    <div class="plant-title">Plant ${i}</div>
                    <div class="metric" style="background: white; margin-bottom: 10px;">
                        <span class="metric-name">Moisture</span>
                        <span class="metric-value">${moisture}<span class="metric-unit">%</span></span>
                    </div>
                    <div class="metric" style="background: white;">
                        <span class="metric-name">Pump</span>
                        <span class="metric-value" style="color: ${pump === 'ON' ? '#51cf66' : '#999'}">${pump}</span>
                    </div>
                    <div class="controls">
                        <button class="btn btn-on" onclick="togglePump(${i}, 'ON')">Turn ON</button>
                        <button class="btn btn-off" onclick="togglePump(${i}, 'OFF')">Turn OFF</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function updateAlertsDisplay() {
            const alertsList = document.getElementById('alertsList');
            const alertsCard = document.getElementById('alertsCard');

            if (systemState.alerts.length === 0) {
                alertsCard.style.display = 'none';
                return;
            }

            alertsCard.style.display = 'block';
            alertsList.innerHTML = '';

            systemState.alerts.slice(-5).forEach(alert => {
                const item = document.createElement('div');
                item.className = `alert-item ${alert.type}`;
                item.innerHTML = `
                    <div>
                        <div class="alert-message">${alert.message}</div>
                        <div class="alert-time">${alert.time}</div>
                    </div>
                `;
                alertsList.appendChild(item);
            });
        }

        function addAlert(title, message, type = 'info') {
            const now = new Date().toLocaleTimeString();
            // Avoid duplicate alerts
            const last = systemState.alerts[systemState.alerts.length - 1];
            if (last && last.message === message) return;
            systemState.alerts.push({ title, message, type, time: now });
            if (systemState.alerts.length > 10) systemState.alerts.shift();
        }

        function togglePump(plantId, state) {
            const topic = `greenhouse/${CONFIG.greenhouseId}/plant/${plantId}/pump`;
            if (systemState.connected) {
                publishMQTT(topic, state);
            } else {
                // Update simulation state directly
                if (!systemState.plants[plantId]) systemState.plants[plantId] = {};
                systemState.plants[plantId].pump = state;
                updateDashboard();
            }
            addAlert(`Plant ${plantId} Pump`, `Pump turned ${state}`, 'info');
        }

        function toggleWindow() {
            const topic = `greenhouse/${CONFIG.greenhouseId}/actuators/window`;
            if (systemState.connected) {
                publishMQTT(topic, 'OPEN');
            }
            addAlert('Ventilation', 'Opening ventilation window', 'info');
        }

        // --- Boot ---
        window.addEventListener('load', () => {
            updatePlantsDisplay();
            connectMQTT();
        });
    </script>
</body>
</html>
