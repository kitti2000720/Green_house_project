# Mosquitto MQTT Broker Configuration
listener 1883
protocol mqtt

# WebSocket listener (for browser dashboard)
listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /tmp/mosquitto/

log_dest file /tmp/mosquitto/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

max_connections -1
max_queued_messages 1000
retain_available true
