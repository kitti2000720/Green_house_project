# Mosquitto MQTT Broker Configuration

# Default listener (MQTT)
listener 1883
protocol mqtt

# WebSocket listener (for browser dashboard)
listener 9001
protocol websockets

# Allow all connections
allow_anonymous true

# Persistence
persistence true
persistence_location /tmp/mosquitto/

# Log settings
log_dest file /tmp/mosquitto/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Max connections
max_connections -1

# Max queued messages
max_queued_messages 1000

# Message retention
retain_available true
